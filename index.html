<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Monitoring - Kabupaten Pati</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo-area">
            <h1>Pati<span>CCTV</span></h1>
        </div>
        <div class="system-status">
            <span class="status-indicator online"></span>
            <p>Sistem Pemantauan Aktif</p>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="searchLocation" placeholder="Cari lokasi...">
            </div>
            
            <h3>Wilayah</h3>
            <ul class="area-list" id="areaList"></ul> 
        </aside>

        <main class="content-area">
            <div class="content-header">
                <h2>Live Monitoring Grid</h2>
            </div>

            <div class="cctv-grid" id="cctvGrid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
